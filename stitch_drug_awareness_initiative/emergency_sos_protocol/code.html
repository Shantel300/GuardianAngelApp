<script>
        const sosBtn = document.getElementById('sosBtn');
        const container = document.body;
        let pressTimer;

        sosBtn.addEventListener('mousedown', startPress);
        sosBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress();
        });

        sosBtn.addEventListener('mouseup', endPress);
        sosBtn.addEventListener('touchend', endPress);
        sosBtn.addEventListener('mouseleave', endPress);

        function startPress() {
            container.classList.add('pressing');
            pressTimer = setTimeout(() => {
                triggerSOS();
            }, 3000);
        }

        function endPress() {
            container.classList.remove('pressing');
            clearTimeout(pressTimer);
        }

        function triggerSOS() {
            // Visual feedback for activation
            sosBtn.classList.add('bg-on-error-container', 'scale-110');
            sosBtn.querySelector('p').innerText = "ALERT SENT";
            
            // Haptic vibration feedback if available
            if ("vibrate" in navigator) {
                navigator.vibrate([100, 30, 100, 30, 200]);
            }
            
            // Simulate dispatch alert
            setTimeout(() => {
                alert("Emergency Services and Trusted Contacts have been notified. Stay exactly where you are.");
            }, 100);
        }
    </script>
