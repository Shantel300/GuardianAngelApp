<script>
        // Simple click interaction for the "Arrived Safely" button
        document.querySelector('.bg-tertiary-container').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Checking In...';
            setTimeout(() => {
                this.style.backgroundColor = '#00aa59';
                this.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Checked In!';
                confetti();
            }, 1500);
        });

        // Basic mock confetti effect
        function confetti() {
            for(let i=0; i<30; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed z-[100] w-2 h-2 rounded-full pointer-events-none';
                particle.style.left = '50%';
                particle.style.bottom = '15%';
                particle.style.backgroundColor = ['#ff5a5f', '#4ae183', '#68abff', '#ffd700'][Math.floor(Math.random()*4)];
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity - 10;
                
                let x = 0;
                let y = 0;
                let gravity = 0.5;
                
                const anim = setInterval(() => {
                    x += vx;
                    y += vy;
                    vy += gravity;
                    particle.style.transform = `translate(${x}px, ${y}px)`;
                    if(y > 500) {
                        clearInterval(anim);
                        particle.remove();
                    }
                }, 20);
            }
        }
