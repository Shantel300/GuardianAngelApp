<style>

            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 90, 95, 0.4); }

<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75"></span>

</span>

</div>

<span class="material-symbols-outlined text-secondary">directions_run</span>
</div>
<div>

<script>
        // Simple micro-interaction for the SOS button press
        const sosBtn = document.querySelector('button.bg-primary-container');
        sosBtn.addEventListener('mousedown', () => {
            sosBtn.style.transform = 'scale(0.95)';
        });
        sosBtn.addEventListener('mouseup', () => {
            sosBtn.style.transform = 'scale(1)';
        });
        sosBtn.addEventListener('mouseleave', () => {
            sosBtn.style.transform = 'scale(1)';
        });

        // Toggle Active State simulation
        const navButtons = document.querySelectorAll('nav button');
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                navButtons.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container');
                    b.classList.add('text-on-surface-variant');
                    const icon = b.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                btn.classList.add('bg-primary-container', 'text-on-primary-container');
                btn.classList.remove('text-on-surface-variant');
                const icon = btn.querySelector('.material-symbols-outlined');
                if (icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
