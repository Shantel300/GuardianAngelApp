<!-- Micro-interaction Script -->
<script>
        function handleGetStarted() {
            // Visual feedback before navigation
            const btn = document.querySelector('button');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span>`;
            
            setTimeout(() => {
                // Mock redirect
                console.log('Redirecting to dashboard...');
                // In a real app: window.location.href = '/dashboard';
            }, 800);
        }

        // Parallax effect for the mascot
        document.addEventListener('mousemove', (e) => {
            const mascot = document.querySelector('img[data-alt*="penguin"]');
            if (mascot) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
                mascot.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
            }
        });
    </script>
